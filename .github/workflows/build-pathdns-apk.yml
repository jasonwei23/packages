name: Build pathdns aarch64 apk

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'pathdns version to build (e.g. 0.1.2); leave empty to build whatever pathdns/Makefile is currently pinned to'
        required: false
  repository_dispatch:
    types: [pathdns-release]

permissions:
  contents: write

env:
  OPENWRT_RELEASE: 25.12.2
  OPENWRT_TARGET: armsr
  OPENWRT_SUBTARGET: armv8

jobs:
  build:
    name: Build aarch64 apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync pathdns version
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          NEW_VERSION="${DISPATCH_VERSION:-$INPUT_VERSION}"
          CURRENT_VERSION=$(sed -n 's/^PKG_VERSION:=//p' pathdns/Makefile)
          if [ -n "$NEW_VERSION" ] && [ "$NEW_VERSION" != "$CURRENT_VERSION" ]; then
            echo "Bumping pathdns $CURRENT_VERSION -> $NEW_VERSION"
            HASH=$(curl -fsSL "https://github.com/jasonwei23/pathdns/releases/download/v${NEW_VERSION}/pathdns-linux-aarch64" | sha256sum | cut -d' ' -f1)
            [ "${#HASH}" = 64 ] || { echo "Failed to fetch/hash pathdns v${NEW_VERSION} release binary"; exit 1; }
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${NEW_VERSION}/" pathdns/Makefile
            sed -i "s/^PKG_HASH:=.*/PKG_HASH:=${HASH}/" pathdns/Makefile
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pathdns/Makefile
            git commit -m "pathdns: bump to v${NEW_VERSION}"
            git push
          else
            echo "Building currently pinned version $CURRENT_VERSION"
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext git \
            libncurses5-dev rsync unzip zlib1g-dev file wget zstd signify-openbsd

      - name: Generate ephemeral package signing key
        run: |
          signify-openbsd -G -n -c 'pathdns packages CI - DO NOT USE' -p packages_ci.pub -s packages_ci.sec
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "KEY_BUILD<<$EOF" >> "$GITHUB_ENV"
          cat packages_ci.sec >> "$GITHUB_ENV"
          echo "$EOF" >> "$GITHUB_ENV"

      - name: Download OpenWrt SDK
        run: |
          TARGET_URL="https://downloads.openwrt.org/releases/${OPENWRT_RELEASE}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}/"
          SDK=$(curl -fsSL "${TARGET_URL}sha256sums" | grep sdk | sed 's/.* \*//')
          wget "${TARGET_URL}${SDK}" -O sdk.tar.zst
          mkdir sdk
          tar -I zstd -xf sdk.tar.zst --strip-components=1 -C sdk
          echo "TARGET_URL=${TARGET_URL}" >> "$GITHUB_ENV"

      - name: Configure SDK
        working-directory: sdk
        run: |
          wget "${TARGET_URL}config.buildinfo" -O .config
          make defconfig

      - name: Add pathdns package
        run: cp -a pathdns sdk/package/

      - name: Build pathdns apk
        working-directory: sdk
        run: |
          make package/pathdns/{download,check} FIXUP=1 V=s
          make package/pathdns/compile V=s

      - name: Collect apk
        run: |
          APK=$(find sdk/bin/packages -name 'pathdns*.apk' | head -1)
          mkdir -p dist
          cp "$APK" "dist/$(basename "$APK" .apk)_aarch64.apk"
          echo "APK_PATH=dist/$(basename "$APK" .apk)_aarch64.apk" >> "$GITHUB_ENV"
          echo "APK_NAME=$(basename "$APK" .apk)_aarch64.apk" >> "$GITHUB_ENV"
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=//p' pathdns/Makefile)
          echo "PKG_VERSION=${PKG_VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=pathdns-v${PKG_VERSION}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pathdns-aarch64-apk
          path: ${{ env.APK_PATH }}

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: pathdns ${{ env.RELEASE_TAG }} (OpenWrt aarch64 apk)
          files: ${{ env.APK_PATH }}
          body: |
            OpenWrt aarch64 (`${{ env.OPENWRT_TARGET }}/${{ env.OPENWRT_SUBTARGET }}`, OpenWrt ${{ env.OPENWRT_RELEASE }}) `.apk` package for
            [pathdns v${{ env.PKG_VERSION }}](https://github.com/jasonwei23/pathdns/releases/tag/v${{ env.PKG_VERSION }}),
            built from the `pathdns/` package definition in this repo.

            Unsigned by any trusted key - install with:
            ```sh
            apk add ${{ env.APK_NAME }} --allow-untrusted
            ```
