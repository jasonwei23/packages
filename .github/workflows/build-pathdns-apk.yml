name: Build pathdns aarch64 apk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pathdns/**'
      - '.github/workflows/build-pathdns-apk.yml'

env:
  OPENWRT_RELEASE: 24.10.5
  OPENWRT_TARGET: armsr
  OPENWRT_SUBTARGET: armv8

jobs:
  build:
    name: Build aarch64 apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget jq zstd signify-openbsd

      - name: Generate ephemeral package signing key
        run: |
          signify-openbsd -G -n -c 'pathdns packages CI - DO NOT USE' -p packages_ci.pub -s packages_ci.sec
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "KEY_BUILD<<$EOF" >> "$GITHUB_ENV"
          cat packages_ci.sec >> "$GITHUB_ENV"
          echo "$EOF" >> "$GITHUB_ENV"

      - name: Download OpenWrt SDK
        run: |
          TARGET_URL="https://downloads.openwrt.org/releases/${OPENWRT_RELEASE}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}/"
          SDK=$(curl -fsSL "${TARGET_URL}sha256sums" | grep sdk | sed 's/.* \*//')
          wget "${TARGET_URL}${SDK}" -O sdk.tar.zst
          mkdir sdk
          tar -I zstd -xf sdk.tar.zst --strip-components=1 -C sdk
          echo "TARGET_URL=${TARGET_URL}" >> "$GITHUB_ENV"

      - name: Configure SDK
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          wget "${TARGET_URL}config.buildinfo" -O .config
          make defconfig

      - name: Add pathdns package
        run: cp -a pathdns sdk/package/

      - name: Build pathdns apk
        working-directory: sdk
        run: |
          make package/pathdns/{download,check} FIXUP=1 V=s
          make package/pathdns/compile -j"$(nproc)" V=s

      - name: Collect apk
        run: |
          APK=$(find sdk/bin/packages -name 'pathdns*.apk' | head -1)
          mkdir -p dist
          cp "$APK" "dist/$(basename "$APK" .apk)_aarch64.apk"
          echo "APK_PATH=dist/$(basename "$APK" .apk)_aarch64.apk" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pathdns-aarch64-apk
          path: ${{ env.APK_PATH }}
